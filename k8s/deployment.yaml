apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuickbank
  labels:
    app: kuickbank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kuickbank
  template:
    metadata:
      labels:
        app: kuickbank
    spec:
      containers:
      - name: kuickbank
        image: quay.io/sjbylo/kuickbank:latest
        ports:
        - containerPort: 8080
        env:
        - name: CLUSTER_NAME
          value: "my-cluster"
        - name: APP_COLOR
          value: "blue"
        volumeMounts:
        - name: data
          mountPath: /opt/app-root/src/data
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: data
        emptyDir: {}
